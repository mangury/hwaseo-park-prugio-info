<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화서역 파크푸르지오 실거래가</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#111;min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:20px 16px 60px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.hico{width:46px;height:46px;background:#1D9E75;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.htitle{font-size:18px;font-weight:600;color:#111}
.hsub{font-size:12px;color:#888;margin-top:3px}
.badge{font-size:11px;padding:3px 10px;border-radius:999px;white-space:nowrap;margin-left:auto}
.badge.sample{background:#FEF3C7;color:#92400E}
.badge.live{background:#D1FAE5;color:#065F46}
.badge.loading{background:#EDE9FE;color:#4C1D95}
.badge.error{background:#FEE2E2;color:#991B1B}
.updated{font-size:11px;color:#ccc;text-align:right;margin-bottom:8px}
.section-label{font-size:13px;font-weight:600;color:#555;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid #e5e7eb}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:32px}
@media(max-width:480px){.grid{grid-template-columns:1fr}}
.card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #eee}
.card-head{padding:14px 16px 12px}
.card-tag-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tag{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px}
.cnt{font-size:12px}
.big-price{font-size:22px;font-weight:700;line-height:1}
.price-sub{font-size:11px;margin-top:6px;opacity:0.75}

/* 84㎡ 계열 — 파랑 */
.t84 .card-head{background:#EFF6FF}.t84 .tag{background:#DBEAFE;color:#1E40AF}
.t84 .cnt{color:#3B82F6}.t84 .big-price,.t84 .price-sub{color:#1E3A8A}
/* 104㎡ 계열 — 초록 */
.t104 .card-head{background:#F0FDF4}.t104 .tag{background:#DCFCE7;color:#166534}
.t104 .cnt{color:#22C55E}.t104 .big-price,.t104 .price-sub{color:#14532D}
/* 118㎡ 계열 — 보라 */
.t118 .card-head{background:#F5F3FF}.t118 .tag{background:#EDE9FE;color:#4C1D95}
.t118 .cnt{color:#8B5CF6}.t118 .big-price,.t118 .price-sub{color:#2E1065}
/* 141㎡ 계열 — 주황 */
.t141 .card-head{background:#FFF7ED}.t141 .tag{background:#FED7AA;color:#7C2D12}
.t141 .cnt{color:#F97316}.t141 .big-price,.t141 .price-sub{color:#7C2D12}
/* 148㎡ 계열 — 핑크 */
.t148 .card-head{background:#FFF1F2}.t148 .tag{background:#FFE4E6;color:#881337}
.t148 .cnt{color:#F43F5E}.t148 .big-price,.t148 .price-sub{color:#881337}
/* 208㎡ 계열 — 회색 */
.t208 .card-head{background:#F8FAFC}.t208 .tag{background:#E2E8F0;color:#1E293B}
.t208 .cnt{color:#64748B}.t208 .big-price,.t208 .price-sub{color:#1E293B}

table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
td{padding:8px 14px;border-bottom:1px solid #f3f4f6;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.empty td{padding:18px;text-align:center;color:#aaa}
.jn{background:#DBEAFE;color:#1E40AF;font-size:11px;padding:2px 7px;border-radius:999px;display:inline-block}
.wl{background:#FEF3C7;color:#78350F;font-size:11px;padding:2px 7px;border-radius:999px;display:inline-block}
.panel{background:#fff;border:1px solid #eee;border-radius:14px;padding:16px;margin-top:10px}
.panel summary{cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:13px;font-weight:600;color:#111}
.panel-body{margin-top:12px}
.panel-sub{font-size:12px;color:#999;margin-bottom:12px}
.row{display:flex;gap:8px}
input[type=text]{flex:1;padding:8px 12px;font-size:13px;border:1px solid #ddd;border-radius:8px;outline:none}
input[type=text]:focus{border-color:#1D9E75}
button{padding:8px 16px;font-size:13px;font-weight:500;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer}
button:hover{background:#f3f4f6}
.msg{font-size:12px;margin-top:8px}
.msg.ok{color:#059669}.msg.err{color:#DC2626}.msg.ing{color:#8B5CF6}
.hint{font-size:11px;color:#bbb;margin-top:8px}
.qr-area{background:#f7f8fa;border:1px solid #eee;border-radius:12px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:76px;justify-content:center}
.qr-ph{font-size:13px;color:#bbb}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="hico">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M2 11L11 3L20 11" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="4" y="11" width="14" height="9" rx="1" stroke="white" stroke-width="1.5"/>
        <rect x="8.5" y="15" width="2.5" height="5" rx="0.5" fill="white" opacity="0.6"/>
        <rect x="11.5" y="15" width="2.5" height="5" rx="0.5" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div>
      <div class="htitle">화서역 파크푸르지오</div>
      <div class="hsub">수원시 장안구 · <span id="drange">-</span></div>
    </div>
    <span class="badge loading" id="badge">불러오는 중...</span>
  </div>

  <div class="updated" id="updated"></div>
  <div class="section-label">매매</div>
  <div class="grid" id="sgrid"></div>
  <div class="section-label">전월세</div>
  <div class="grid" id="rgrid"></div>

  <details class="panel">
    <summary><span class="panel-title">실시간 데이터 연동</span><span style="font-size:12px;color:#aaa">▾</span></summary>
    <div class="panel-body">
      <div class="panel-sub">API 키가 내장되어 자동으로 불러옵니다.</div>
      <button onclick="loadData()" style="width:100%">데이터 다시 불러오기</button>
      <div class="msg" id="amsg"></div>
    </div>
  </details>

  <div class="panel" style="margin-top:12px">
    <div class="panel-title" style="margin-bottom:10px">QR 코드 생성</div>
    <div class="row" style="margin-bottom:10px">
      <input type="text" id="qu" value="https://mangury.github.io/hwaseo-park-prugio-info/">
      <button onclick="gqr()">생성</button>
    </div>
    <div class="qr-area">
      <div class="qr-ph" id="qbox-ph">생성 버튼을 눌러주세요</div>
      <div id="qbox"></div>
    </div>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const API_KEY = 'c6425e966694d23917ef40d292e3b4f5fa57992dcd8ca0caf40fcf490c1146f2';
const TODAY = new Date();
const FROM  = new Date(TODAY); FROM.setMonth(FROM.getMonth()-6);

/* 평형 타입 정의
   83A·84B      → '84'  (80~90)
   104A·105B    → '104' (90~112)
   116A·118B·C  → '118' (112~130)
   140B·141A    → '141' (130~145)
   148A·148B    → '148' (145~175)
   208A·208B    → '208' (175~)
*/
const ATS  = ['84','104','118','141','148','208'];
const ALB  = {'84':'84㎡','104':'104㎡','118':'118㎡','141':'141㎡','148':'148㎡','208':'208㎡'};
const CLS  = {'84':'t84','104':'t104','118':'t118','141':'t141','148':'t148','208':'t208'};
const NAME = '화서역파크푸르지오';

function gt(a){
if(!a||a<=0) return null;
  if(a<90)  return '84';
  if(a<112) return '104';
  if(a<130) return '118';
  if(a<145) return '141';
  if(a<175) return '148';
  return '208';
}
function inR(y,m,d){const t=new Date(y,m-1,d);return t>=FROM&&t<=TODAY;}
function fdt(dt){return`${dt.getFullYear()}.${p2(dt.getMonth()+1)}.${p2(dt.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function fd(y,m,d){return y!==TODAY.getFullYear()?`${y}.${p2(m)}.${p2(d)}`:`${p2(m)}.${p2(d)}`;}
function fc(w){
  if(!w||isNaN(w))return'-';
  const u=Math.floor(w/10000),r=w%10000;
  if(u>0&&r>0)return u+'억 '+r.toLocaleString()+'만';
  return u>0?u+'억':r.toLocaleString()+'만';
}
function str(v){return String(v===null||v===undefined?'':v).replace(/,/g,'');}
function pi(v){return parseInt(str(v),10)||0;}
function pf(v){return parseFloat(str(v))||0;}
function setBadge(s){
  const b=document.getElementById('badge');
  const m={live:['badge live','실시간 데이터'],loading:['badge loading','불러오는 중...'],error:['badge error','오류'],sample:['badge sample','샘플 데이터']};
  b.className=m[s][0]; b.textContent=m[s][1];
}
function noData(c){return`<tr class="empty"><td colspan="${c}">이 기간 거래 없음</td></tr>`;}

function renderSale(data){
  document.getElementById('sgrid').innerHTML=ATS.map(t=>{
    const d=[...data.filter(x=>x.type===t)].sort((a,b)=>(b.y*10000+b.m*100+b.d)-(a.y*10000+a.m*100+a.d));
    const has=d.length>0;
    const rp=has?fc(d[0].price):'-';
    const lo=has&&d.length>1?fc(Math.min(...d.map(x=>x.price))):null;
    const hi=has&&d.length>1?fc(Math.max(...d.map(x=>x.price))):null;
    const arrow=has&&d.length>1?(d[0].price>d[d.length-1].price?' ▲':d[0].price<d[d.length-1].price?' ▼':''):'';
    const rows=has?d.map(x=>`<tr>
      <td style="width:36%;color:#888">${fd(x.y,x.m,x.d)}</td>
      <td style="width:46%;text-align:right;font-weight:600">${fc(x.price)}</td>
      <td style="width:18%;text-align:right;color:#aaa">${x.floor}층</td>
    </tr>`).join(''):noData(3);
    return`<div class="card ${CLS[t]}">
      <div class="card-head">
        <div class="card-tag-row"><span class="tag">${ALB[t]}</span><span class="cnt">${has?d.length+'건':'거래없음'}</span></div>
        <div class="big-price">${rp}${arrow}</div>
        <div class="price-sub">${lo?lo+' ~ '+hi:'최근 거래가'}</div>
      </div>
      <table><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');
}

function renderRent(data){
  document.getElementById('rgrid').innerHTML=ATS.map(t=>{
    const d=[...data.filter(x=>x.type===t)].sort((a,b)=>(b.y*10000+b.m*100+b.d)-(a.y*10000+a.m*100+a.d));
    const has=d.length>0;
    const jn=d.filter(x=>x.mon===0).length, wl=d.filter(x=>x.mon>0).length;
    const cnt=has?[jn?`전세 ${jn}건`:'',wl?`월세 ${wl}건`:''].filter(Boolean).join(' · '):'거래없음';
    const recent=has?(d[0].mon>0?`${fc(d[0].dep)} / ${d[0].mon}만`:fc(d[0].dep)):'-';
    const rows=has?d.map(x=>{const w=x.mon>0;return`<tr>
      <td style="width:28%;color:#888">${fd(x.y,x.m,x.d)}</td>
      <td style="width:18%"><span class="${w?'wl':'jn'}">${w?'월세':'전세'}</span></td>
      <td style="width:42%;text-align:right;font-weight:600">${w?fc(x.dep)+' / '+x.mon+'만':fc(x.dep)}</td>
      <td style="width:12%;text-align:right;color:#aaa">${x.floor}층</td>
    </tr>`;}).join(''):noData(4);
    return`<div class="card ${CLS[t]}">
      <div class="card-head">
        <div class="card-tag-row"><span class="tag">${ALB[t]}</span><span class="cnt">${d.length}건</span></div>
        <div class="big-price" style="font-size:20px">${recent}</div>
        <div class="price-sub">${cnt}</div>
      </div>
      <table><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');
}

function getMonths(){
  const now=new Date(),months=[];
  for(let i=0;i<3;i++){
    const dt=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push(dt.getFullYear()+p2(dt.getMonth()+1));
  }
  return months;
}

async function fetchOne(type,ym){
  const EP=type==='sale'
    ?'RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev'
    :'RTMSDataSvcAptRent/getRTMSDataSvcAptRent';
  const target=`https://apis.data.go.kr/1613000/${EP}?serviceKey=${encodeURIComponent(API_KEY)}&LAWD_CD=41111&DEAL_YMD=${ym}&pageNo=1&numOfRows=1000&_type=json`;
  const res=await fetch('https://corsproxy.io/?'+encodeURIComponent(target));
  const json=await res.json();
  const raw=json?.response?.body?.items?.item??[];
  return Array.isArray(raw)?raw:(raw&&Object.keys(raw).length>0?[raw]:[]);
}

async function loadData(){
  const msg=document.getElementById('amsg');
  setBadge('loading');
  msg.className='msg ing'; msg.textContent='불러오는 중...';
  try{
    const months=getMonths();
    let si=[],ri=[];
    for(const ym of months){
      const [s,r]=await Promise.all([fetchOne('sale',ym),fetchOne('rent',ym)]);
      si=si.concat(s); ri=ri.concat(r);
    }
    const fa=arr=>arr.filter(it=>(it['아파트']||it['aptNm']||'').replace(/\s/g,'').includes(NAME));
    const SD=fa(si).map(it=>({
      y:pi(it['년']||it['dealYear']),
      m:pi(it['월']||it['dealMonth']),
      d:pi(it['일']||it['dealDay']),
      area:pf(it['excluUseAr']||it['전용면적']||it['전용면적(㎡)']||it['useAr']||0),
      price:pi(it['거래금액']||it['dealAmount']),
      floor:pi(it['층']||it['floor']),
      type:gt(pf(it['전용면적']||it['excluUseAr']))
    })).filter(x=>x.price>0&&x.type&&inR(x.y,x.m,x.d));
    const RD=fa(ri).map(it=>({
      y:pi(it['년']||it['contractYear']||it['dealYear']),
      m:pi(it['월']||it['contractMonth']||it['dealMonth']),
      d:pi(it['일']||it['contractDay']||it['dealDay']),
      area:pf(it['excluUseAr']||it['전용면적']||it['전용면적(㎡)']||it['useAr']||0),
      dep:pi(it['보증금액']||it['deposit']||it['보증금']),
      mon:pi(it['월세금액']||it['monthlyRent']||it['월세']),
      floor:pi(it['층']||it['floor']),
      type:gt(pf(it['전용면적']||it['excluUseAr']))
    })).filter(x=>x.dep>0&&x.type&&inR(x.y,x.m,x.d));
    document.getElementById('amsg').innerHTML='<b>첫번째 매매 데이터 필드:</b><br>'+JSON.stringify(fa(si)[0]||si[0]||{});
    setBadge('live');
    msg.className='msg ok';
    msg.textContent=`매매 ${SD.length}건 · 전월세 ${RD.length}건 불러오기 완료`;
    document.getElementById('updated').textContent=`마지막 업데이트: ${fdt(TODAY)}`;
    renderSale(SD);
    renderRent(RD);
  }catch(e){
    setBadge('error');
    msg.className='msg err';
    msg.textContent='오류: '+e.message;
  }
}

function gqr(){
  const url=document.getElementById('qu').value.trim(); if(!url)return;
  document.getElementById('qbox-ph').style.display='none';
  const box=document.getElementById('qbox'); box.innerHTML='';
  const qd=document.createElement('div'); box.appendChild(qd);
  new QRCode(qd,{text:url,width:180,height:180,correctLevel:QRCode.CorrectLevel.H});
  setTimeout(()=>{
    const cv=qd.querySelector('canvas');
    if(cv){
      const b=document.createElement('button');
      b.textContent='PNG 다운로드'; b.style.marginTop='4px';
      b.onclick=()=>{const a=document.createElement('a');a.download='qr_화서역파크푸르지오.png';a.href=cv.toDataURL();a.click();};
      box.appendChild(b);
    }
  },300);
}

document.getElementById('drange').textContent=`${fdt(FROM)} ~ ${fdt(TODAY)}`;
loadData();
</script>
</body>
</html>
