<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화서역 파크푸르지오 실거래가</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f8fa;color:#111;min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:20px 16px 60px}

  /* 헤더 */
  .header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .hico{width:46px;height:46px;background:#1D9E75;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .htitle{font-size:18px;font-weight:600;color:#111}
  .hsub{font-size:12px;color:#888;margin-top:3px}
  .badge{font-size:11px;padding:3px 10px;border-radius:999px;white-space:nowrap;margin-left:auto}
  .badge.sample{background:#FEF3C7;color:#92400E}
  .badge.live{background:#D1FAE5;color:#065F46}
  .badge.loading{background:#EDE9FE;color:#4C1D95}
  .badge.error{background:#FEE2E2;color:#991B1B}

  /* 섹션 */
  .section-label{font-size:13px;font-weight:600;color:#555;margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid #e5e7eb;letter-spacing:0.03em}

  /* 카드 그리드 */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:32px}
  @media(max-width:480px){.grid{grid-template-columns:1fr}}

  .card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #eee}
  .card-head{padding:14px 16px 12px}
  .card-tag-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .tag{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px}
  .cnt{font-size:12px}
  .big-price{font-size:26px;font-weight:700;line-height:1}
  .price-sub{font-size:11px;margin-top:6px;opacity:0.75}
  .trend-up{font-size:14px}
  .trend-dn{font-size:14px}

  /* 평형 색상 */
  .t59 .card-head{background:#EFF6FF}.t59 .tag{background:#DBEAFE;color:#1E40AF}.t59 .cnt{color:#3B82F6}.t59 .big-price,.t59 .price-sub,.t59 .trend-up,.t59 .trend-dn{color:#1E3A8A}
  .t74 .card-head{background:#F0FDF4}.t74 .tag{background:#DCFCE7;color:#166534}.t74 .cnt{color:#22C55E}.t74 .big-price,.t74 .price-sub,.t74 .trend-up,.t74 .trend-dn{color:#14532D}
  .t84 .card-head{background:#F5F3FF}.t84 .tag{background:#EDE9FE;color:#4C1D95}.t84 .cnt{color:#8B5CF6}.t84 .big-price,.t84 .price-sub,.t84 .trend-up,.t84 .trend-dn{color:#2E1065}
  .t99 .card-head{background:#FFFBEB}.t99 .tag{background:#FEF3C7;color:#78350F}.t99 .cnt{color:#F59E0B}.t99 .big-price,.t99 .price-sub,.t99 .trend-up,.t99 .trend-dn{color:#451A03}

  /* 테이블 */
  table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
  td{padding:8px 14px;border-bottom:1px solid #f3f4f6;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafafa}
  .empty td{padding:18px;text-align:center;color:#aaa}

  /* 배지 */
  .jn{background:#DBEAFE;color:#1E40AF;font-size:11px;padding:2px 7px;border-radius:999px;display:inline-block}
  .wl{background:#FEF3C7;color:#78350F;font-size:11px;padding:2px 7px;border-radius:999px;display:inline-block}

  /* 하단 패널 */
  .panel{background:#fff;border:1px solid #eee;border-radius:14px;padding:16px;margin-top:10px}
  .panel-title{font-size:13px;font-weight:600;color:#111;margin-bottom:4px}
  .panel-sub{font-size:12px;color:#999;margin-bottom:12px}
  .row{display:flex;gap:8px}
  input[type=text],input[type=password]{flex:1;padding:8px 12px;font-size:13px;border:1px solid #ddd;border-radius:8px;outline:none}
  input:focus{border-color:#1D9E75}
  button{padding:8px 16px;font-size:13px;font-weight:500;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer}
  button:hover{background:#f3f4f6}
  .msg{font-size:12px;margin-top:8px}
  .msg.ok{color:#059669}.msg.err{color:#DC2626}.msg.ing{color:#8B5CF6}
  .hint{font-size:11px;color:#bbb;margin-top:8px}

  .qr-area{background:#f7f8fa;border:1px solid #eee;border-radius:12px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:76px;justify-content:center}
  .qr-ph{font-size:13px;color:#bbb}

  /* 업데이트 시각 */
  .updated{font-size:11px;color:#ccc;text-align:right;margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">

  <!-- 헤더 -->
  <div class="header">
    <div class="hico">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M2 11L11 3L20 11" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="4" y="11" width="14" height="9" rx="1" stroke="white" stroke-width="1.5"/>
        <rect x="8.5" y="15" width="2.5" height="5" rx="0.5" fill="white" opacity="0.6"/>
        <rect x="11.5" y="15" width="2.5" height="5" rx="0.5" fill="white" opacity="0.6"/>
        <rect x="7" y="12.5" width="2" height="1.8" rx="0.4" fill="white" opacity="0.5"/>
        <rect x="13" y="12.5" width="2" height="1.8" rx="0.4" fill="white" opacity="0.5"/>
      </svg>
    </div>
    <div>
      <div class="htitle">화서역 파크푸르지오</div>
      <div class="hsub">수원시 장안구 · <span id="drange">-</span></div>
    </div>
    <span class="badge sample" id="badge">샘플 데이터</span>
  </div>

  <div class="updated" id="updated"></div>

  <!-- 매매 -->
  <div class="section-label">매매</div>
  <div class="grid" id="sgrid"></div>

  <!-- 전월세 -->
  <div class="section-label">전월세</div>
  <div class="grid" id="rgrid"></div>

  <!-- API 연동 -->
  <details class="panel">
    <summary style="cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center">
      <span class="panel-title">실시간 데이터 연동</span>
      <span style="font-size:12px;color:#aaa">▾</span>
    </summary>
    <div style="margin-top:12px">
      <div class="panel-sub">공공데이터포털에서 발급받은 API 키를 입력하세요.<br>배포 환경에서는 환경변수(MLIT_API_KEY)로 자동 적용됩니다.</div>
      <div class="row">
        <input type="password" id="ak" placeholder="서비스키 (디코딩된 키)">
        <button onclick="fetchAll()">불러오기</button>
      </div>
      <div class="msg" id="amsg" style="display:none"></div>
      <div class="hint">data.go.kr → "아파트매매 실거래 상세 자료" + "아파트 전월세 자료" 신청</div>
    </div>
  </details>

  <!-- QR -->
  <div class="panel" style="margin-top:12px">
    <div class="panel-title">QR 코드 생성</div>
    <div class="panel-sub">배포 완료 후 실제 URL을 입력하세요.</div>
    <div class="row" style="margin-bottom:10px">
      <input type="text" id="qu" value="https://hwaseo-realestate.pages.dev">
      <button onclick="gqr()">생성</button>
    </div>
    <div class="qr-area" id="qbox-area">
      <div class="qr-ph" id="qbox-ph">URL을 입력하고 생성 버튼을 눌러주세요</div>
      <div id="qbox"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const TODAY=new Date(),FROM=new Date(TODAY);
FROM.setMonth(FROM.getMonth()-2);

function ago(n){const d=new Date(TODAY);d.setDate(d.getDate()-n);return{y:d.getFullYear(),m:d.getMonth()+1,d:d.getDate()};}
function gt(a){return a<65?'59':a<80?'74':a<92?'84':'99';}
function inR(y,m,d){const t=new Date(y,m-1,d);return t>=FROM&&t<=TODAY;}
function fc(w){if(!w)return'-';const u=Math.floor(w/10000),r=w%10000;if(u>0&&r>0)return u+'억 '+r.toLocaleString()+'만';return u>0?u+'억':r.toLocaleString()+'만';}
function fcs(w){if(!w)return'-';const u=Math.floor(w/10000),r=w%10000;if(u>0&&r>0)return u+'억 '+r+'만';return u>0?u+'억':r+'만';}
function fdt(dt){return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;}
function fd(y,m,d){const s=n=>String(n).padStart(2,'0');return y!==TODAY.getFullYear()?`${y}.${s(m)}.${s(d)}`:`${s(m)}.${s(d)}`;}

const API_KEY = 'c6425e966694d23917ef40d292e3b4f5fa57992dcd8ca0caf40fcf490c1146f2'; // ← 실제 API 키로 교체

const ATS=['59','74','84','99'],ALB={'59':'59㎡','74':'74㎡','84':'84㎡','99':'99㎡'};
const CLS={'59':'t59','74':'t74','84':'t84','99':'t99'};

let SD=[
  {n:1,area:99.10,price:82000,floor:23},{n:4,area:84.94,price:65000,floor:18},
  {n:6,area:59.92,price:50000,floor:12},{n:12,area:99.10,price:80000,floor:20},
  {n:18,area:84.94,price:64500,floor:7},{n:24,area:74.22,price:58000,floor:11},
  {n:29,area:59.92,price:49500,floor:5},{n:33,area:84.94,price:63000,floor:25},
  {n:39,area:74.22,price:57500,floor:9},{n:44,area:59.92,price:48000,floor:3},
  {n:49,area:84.94,price:62000,floor:14},{n:55,area:99.10,price:78000,floor:16},
  {n:57,area:74.22,price:57000,floor:22},
].map(x=>({...ago(x.n),area:x.area,price:x.price,floor:x.floor,type:gt(x.area)}));

let RD=[
  {n:2,area:84.94,dep:38000,mon:0,floor:15},{n:3,area:99.10,dep:46000,mon:0,floor:19},
  {n:7,area:59.92,dep:28000,mon:0,floor:8},{n:10,area:74.22,dep:5000,mon:125,floor:16},
  {n:15,area:84.94,dep:5000,mon:140,floor:22},{n:20,area:74.22,dep:32000,mon:0,floor:11},
  {n:22,area:59.92,dep:3000,mon:95,floor:5},{n:27,area:99.10,dep:45000,mon:0,floor:18},
  {n:32,area:84.94,dep:36000,mon:0,floor:7},{n:38,area:74.22,dep:5000,mon:120,floor:14},
  {n:44,area:59.92,dep:27000,mon:0,floor:3},{n:50,area:84.94,dep:5000,mon:145,floor:25},
  {n:56,area:99.10,dep:43000,mon:0,floor:12},
].map(x=>({...ago(x.n),area:x.area,dep:x.dep,mon:x.mon,floor:x.floor,type:gt(x.area)}));

function trend(d,key){
  if(d.length<2)return'';
  const n=d[0][key],o=d[d.length-1][key];
  return n>o?' <span class="trend-up">▲</span>':n<o?' <span class="trend-dn">▼</span>':'';
}
function noData(cols){return`<tr class="empty"><td colspan="${cols}">이 기간 거래 없음</td></tr>`;}

function rSale(){
  document.getElementById('sgrid').innerHTML=ATS.map(t=>{
    const d=[...SD.filter(x=>x.type===t)].sort((a,b)=>(b.y*10000+b.m*100+b.d)-(a.y*10000+a.m*100+a.d));
    const has=d.length>0;
    const rp=has?fc(d[0].price):'-';
    const lo=has&&d.length>1?fcs(Math.min(...d.map(x=>x.price))):null;
    const hi=has&&d.length>1?fcs(Math.max(...d.map(x=>x.price))):null;
    const rows=has?d.slice(0,5).map(x=>`<tr>
      <td style="width:38%;color:#888">${fd(x.y,x.m,x.d)}</td>
      <td style="width:44%;text-align:right;font-weight:600">${fc(x.price)}</td>
      <td style="width:18%;text-align:right;color:#aaa">${x.floor}층</td>
    </tr>`).join(''):noData(3);
    return`<div class="card ${CLS[t]}">
      <div class="card-head">
        <div class="card-tag-row">
          <span class="tag">${ALB[t]}</span>
          <span class="cnt">${has?d.length+'건':'거래 없음'}</span>
        </div>
        <div class="big-price">${rp}${has?trend(d,'price'):''}</div>
        <div class="price-sub">${lo?lo+' ~ '+hi:'최근 거래가'}</div>
      </div>
      <table><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');
}

function rRent(){
  document.getElementById('rgrid').innerHTML=ATS.map(t=>{
    const d=[...RD.filter(x=>x.type===t)].sort((a,b)=>(b.y*10000+b.m*100+b.d)-(a.y*10000+a.m*100+a.d));
    const has=d.length>0;
    const jn=d.filter(x=>x.mon===0).length,wl=d.filter(x=>x.mon>0).length;
    const cnt=[jn?`전세 ${jn}건`:'',wl?`월세 ${wl}건`:''].filter(Boolean).join(' · ')||'거래 없음';
    const recent=has?(d[0].mon>0?`${fcs(d[0].dep)} / ${d[0].mon}만`:fcs(d[0].dep)):'-';
    const rows=has?d.slice(0,5).map(x=>{const w=x.mon>0;return`<tr>
      <td style="width:30%;color:#888">${fd(x.y,x.m,x.d)}</td>
      <td style="width:18%"><span class="${w?'wl':'jn'}">${w?'월세':'전세'}</span></td>
      <td style="width:40%;text-align:right;font-weight:600">${w?fcs(x.dep)+' / '+x.mon+'만':fcs(x.dep)}</td>
      <td style="width:12%;text-align:right;color:#aaa">${x.floor}층</td>
    </tr>`;}).join(''):noData(4);
    return`<div class="card ${CLS[t]}">
      <div class="card-head">
        <div class="card-tag-row">
          <span class="tag">${ALB[t]}</span>
          <span class="cnt">${d.length}건</span>
        </div>
        <div class="big-price" style="font-size:21px">${recent}</div>
        <div class="price-sub">${cnt}</div>
      </div>
      <table><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');
}

function setBadge(state){
  const b=document.getElementById('badge');
  if(state==='live'){b.className='badge live';b.textContent='실시간 데이터';}
  else if(state==='loading'){b.className='badge loading';b.textContent='불러오는 중...';}
  else if(state==='error'){b.className='badge error';b.textContent='오류';}
  else{b.className='badge sample';b.textContent='샘플 데이터';}
}

function getMonths(){
  const now=new Date(),months=[];
  for(let i=0;i<3;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(d.getFullYear()+String(d.getMonth()+1).padStart(2,'0'));}
  return months;
}

async function callApi(type, ym) {
  const PROXY = 'https://corsproxy.io/?';
  const EP = type==='sale'
    ? 'RTMSDataSvcAptTradeDev/getRTMSDataSvcAptTradeDev'
    : 'RTMSDataSvcAptRent/getRTMSDataSvcAptRent';
  const url = `https://apis.data.go.kr/1613000/${EP}?serviceKey=${encodeURIComponent(API_KEY)}&LAWD_CD=41111&DEAL_YMD=${ym}&pageNo=1&numOfRows=100&_type=json`;
  const res = await fetch(PROXY + encodeURIComponent(url));
  const data = await res.json();
  const raw = data?.response?.body?.items?.item ?? [];
  return Array.isArray(raw) ? raw : (raw && raw['아파트'] ? [raw] : []);
}

async function fetchAll(){
  const msg=document.getElementById('amsg');
  msg.style.display='block';
  setBadge('loading');
  msg.className='msg ing';msg.textContent='데이터를 불러오는 중입니다...';
  const months=getMonths();
  const NAME='화서역파크푸르지오';
  try{
    let si=[],ri=[];
    for(const ym of months){
      const [s,r]=await Promise.all([callApi('sale',ym),callApi('rent',ym)]);
      si=si.concat(s);ri=ri.concat(r);
    }
    const fa=arr=>arr.filter(it=>(it['아파트']||'').replace(/\s/g,'').includes(NAME));
    SD=fa(si).map(it=>{
      const area=parseFloat(it['전용면적']||0),price=parseInt((it['거래금액']||'0').replace(/,/g,''),10);
      const y=parseInt(it['년']||0,10),m=parseInt(it['월']||0,10),d=parseInt(it['일']||0,10);
      return{y,m,d,area,price,floor:parseInt(it['층']||0,10),type:gt(area)};
    }).filter(x=>x.price>0&&inR(x.y,x.m,x.d));
    RD=fa(ri).map(it=>{
      const area=parseFloat(it['전용면적']||0),dep=parseInt((it['보증금액']||'0').replace(/,/g,''),10),mon=parseInt((it['월세금액']||'0').replace(/,/g,''),10);
      const y=parseInt(it['년']||0,10),m=parseInt(it['월']||0,10),d=parseInt(it['일']||0,10);
      return{y,m,d,area,dep,mon,floor:parseInt(it['층']||0,10),type:gt(area)};
    }).filter(x=>x.dep>0&&inR(x.y,x.m,x.d));
    setBadge('live');
    msg.className='msg ok';msg.textContent=`매매 ${SD.length}건 · 전월세 ${RD.length}건 불러오기 완료`;
    document.getElementById('updated').textContent=`마지막 업데이트: ${fdt(TODAY)}`;
    rSale();rRent();
  }catch(e){
    setBadge('error');
    msg.className='msg err';msg.textContent='오류: '+e.message;
  }
}

function gqr(){
  const url=document.getElementById('qu').value.trim();if(!url)return;
  document.getElementById('qbox-ph').style.display='none';
  const box=document.getElementById('qbox');box.innerHTML='';
  const qd=document.createElement('div');box.appendChild(qd);
  new QRCode(qd,{text:url,width:180,height:180,correctLevel:QRCode.CorrectLevel.H});
  setTimeout(()=>{
    const cv=qd.querySelector('canvas');
    if(cv){const b=document.createElement('button');b.textContent='PNG 다운로드';b.style.cssText='font-size:13px;margin-top:4px';
    b.onclick=()=>{const a=document.createElement('a');a.download='qrcode_화서역파크푸르지오.png';a.href=cv.toDataURL();a.click();};box.appendChild(b);}
  },200);
}

document.getElementById('drange').textContent=`${fdt(FROM)} ~ ${fdt(TODAY)}`;
rSale();rRent();
fetchAll();
</script>
</body>
</html>
